<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartCourse AI - Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
height:100vh;
overflow:hidden;
}

/* Background */

.bg{
position:fixed;
width:100%;
height:100%;
background:url('https://images.unsplash.com/photo-1523240795612-9a054b0db644') center/cover no-repeat;
}

/* Dark Overlay */

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
}

/* Center Layout */

.container{
position:relative;
z-index:2;
height:100vh;

display:flex;
justify-content:center;
align-items:center;
}

/* Login Card */

.card{

width:380px;
padding:45px;

background:rgba(255,255,255,0.08);
backdrop-filter: blur(16px);

border-radius:14px;

color:white;

box-shadow:0 25px 70px rgba(0,0,0,0.6);

text-align:center;
}

/* Logo Title */

.logo{
font-size:28px;
font-weight:600;
margin-bottom:8px;
}

.subtitle{
font-size:14px;
opacity:0.85;
margin-bottom:28px;
}

/* Input Fields */

.input-group{
text-align:left;
margin-top:15px;
}

label{
font-size:13px;
opacity:0.85;
}

input{

width:100%;
padding:12px;

margin-top:6px;

border:none;
border-radius:8px;

background:rgba(255,255,255,0.15);
color:white;

outline:none;
}

input::placeholder{
color:#e5e5e5;
}

/* Button */

button{

width:100%;
padding:13px;

margin-top:22px;

border:none;
border-radius:8px;

background:#2563eb;

color:white;

font-size:15px;
font-weight:500;

cursor:pointer;

transition:0.3s;
}

button:hover{
background:#1e40af;
}

/* Footer */

.footer{

margin-top:25px;

font-size:12px;
opacity:0.75;

}

</style>

</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">

<div class="card">

<div class="logo">
SmartCourse AI
</div>

<div class="subtitle">
AI Powered Course Recommendation System
</div>

<form action="/home">

<div class="input-group">
<label>Username</label>
<input type="text" placeholder="Enter your username">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" placeholder="Enter your password">
</div>

<button type="submit">
Sign In
</button>

</form>

<div class="footer">
Virtual University of Pakistan
</div>

</div>

</div>

</body>
</html>
